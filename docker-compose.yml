version: '3.8'

services:
  # Redis
  redis:
    image: redis:7-alpine
    container_name: growth-sender-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - growth-sender-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: growth-sender-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-uazapi}
      UAZAPI_URL: ${UAZAPI_URL}
      UAZAPI_ADMIN_TOKEN: ${UAZAPI_ADMIN_TOKEN}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      DB_SSL: ${DB_SSL:-false}
    ports:
      - "3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - growth-sender-network
    restart: unless-stopped

  # Backend Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: growth-sender-worker
    command: node src/workers/campaignWorker.js
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-uazapi}
      UAZAPI_URL: ${UAZAPI_URL}
      UAZAPI_ADMIN_TOKEN: ${UAZAPI_ADMIN_TOKEN}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - growth-sender-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: growth-sender-frontend
    depends_on:
      - backend
    networks:
      - growth-sender-network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  growth-sender-network:
    driver: bridge
