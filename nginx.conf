events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    # Upstream para backend
    upstream backend {
        server backend:3001;
    }

    # Upstream para frontend
    upstream frontend {
        server frontend:80;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name sender.growthdigitalmkt.com.br api-sender.growthdigitalmkt.com.br s3-sender.growthdigitalmkt.com.br;

        # Certbot challenge (para renovação)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect tudo para HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Frontend HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name sender.growthdigitalmkt.com.br;

        # SSL certificates
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Rate limiting
        limit_req zone=general_limit burst=20 nodelay;

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Backend API HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name api-sender.growthdigitalmkt.com.br;

        # SSL certificates
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        # Aumentar limite de upload (500MB - máximo para documentos)
        client_max_body_size 500M;

        # Headers CORS globais para este servidor (sempre aplicados)
        add_header Access-Control-Allow-Origin "https://sender.growthdigitalmkt.com.br" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;

        # Tratar requisições OPTIONS (preflight CORS)
        location / {
            # Se for OPTIONS, retornar imediatamente com headers CORS
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://sender.growthdigitalmkt.com.br" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age "3600" always;
                add_header Content-Type "text/plain; charset=UTF-8" always;
                add_header Content-Length 0 always;
                return 204;
            }

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Passar headers CORS do backend para o cliente
            # O backend já envia os headers CORS, mas garantimos que sejam repassados
            proxy_pass_header Access-Control-Allow-Origin;
            proxy_pass_header Access-Control-Allow-Methods;
            proxy_pass_header Access-Control-Allow-Headers;
            proxy_pass_header Access-Control-Allow-Credentials;
            proxy_pass_header Access-Control-Expose-Headers;
            proxy_pass_header Access-Control-Max-Age;

            # Timeouts para requests longos (aumentado para uploads grandes)
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Tratamento de erros com CORS
            proxy_intercept_errors on;
            error_page 413 = @cors_413;
            error_page 502 503 504 = @cors_error;
        }

        # Handler de erro 413 (Content Too Large) com CORS
        location @cors_413 {
            add_header Access-Control-Allow-Origin "https://sender.growthdigitalmkt.com.br" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Type "application/json" always;
            return 413 '{"error":"Arquivo muito grande. Limites: Imagens e vídeos: 50MB | Documentos: 500MB"}';
        }

        # Handler de erro com CORS
        location @cors_error {
            add_header Access-Control-Allow-Origin "https://sender.growthdigitalmkt.com.br" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Type "application/json" always;
            return 502 '{"error":"Service temporarily unavailable"}';
        }
    }

    # Minio S3 HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name s3-sender.growthdigitalmkt.com.br;

        # SSL certificates
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Aumentar limite de upload
        client_max_body_size 100M;

        # Ignorar headers inválidos
        ignore_invalid_headers off;

        location / {
            # Path-style access (s3-sender.com/bucket/file)
            proxy_pass http://10.0.0.3:9000;
            proxy_http_version 1.1;
            
            # NÃO passar Host (deixar Minio usar IP)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            
            # Headers específicos do Minio
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
            
            # CORS
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type" always;
            
            # Timeouts
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
        }
    }
}

